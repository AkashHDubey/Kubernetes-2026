apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes: # Define volume
        - name: shared
          persistentVolumeClaim:
            claimName: ping-pong-share
      containers:
        - name: log-output-generate
          image: dubeaka/log-generate:2.0
          volumeMounts: # Mount volume
            - name: shared
              mountPath: /usr/src/app/file
        - name: log-output-show
          image: dubeaka/log-show:2.1
          volumeMounts: # Mount volume
            - name: shared
              mountPath: /usr/src/app/file