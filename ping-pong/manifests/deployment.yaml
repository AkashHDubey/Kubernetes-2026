apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: ping-pong-share
      containers:
        - name: ping-pong
          image: dubeaka/ping-pong:3.0
          volumeMounts:
            - name: shared
              mountPath: /usr/src/app/file